# Chest X-ray multi-label classification config
model: densenet121        # timm backbone (CheXNet baseline)
pretrained: true
image_size: 224           # ChestMNIST supports 28 / 64 / 128 / 224
batch_size: 64
epochs: 15
lr: 0.0003
weight_decay: 0.0001
num_workers: 0           # 0 on Windows: ChestMNIST is in-memory, no IO bottleneck
data_dir: null            # null -> default MedMNIST cache (~/.medmnist)
output_dir: outputs
